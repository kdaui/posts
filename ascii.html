<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Converter</title>
    <style>
        :root {
            --primary-dark: #0A0F1C;
            --secondary-dark: #141928;
            --tertiary-dark: #1C2333;
            --primary-blue: #1B3A5F;
            --secondary-blue: #2C4E7C;
            --accent-blue: #3D6299;
            --light-accent: #5E8ABF;
            --text-primary: #B8C5D6;
            --text-secondary: #8A9BB3;
            --border-color: #2A3F5F;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--primary-dark);
            color: var(--text-primary);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .technical-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 200%;
            z-index: -1;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--secondary-dark) 100%);
        }

        .circuit-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
        }

        .grid-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(rgba(94, 138, 191, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(94, 138, 191, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .scanning-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg,
                transparent 50%,
                rgba(94, 138, 191, 0.03) 50%);
            background-size: 100% 4px;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--light-accent);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
            width: 100%;
        }

        h1::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--light-accent), transparent);
        }

        .upload-zone {
            border: 2px dashed var(--accent-blue);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            background: rgba(28, 35, 51, 0.6);
        }

        .upload-zone:hover {
            background: rgba(61, 98, 153, 0.2);
            border-color: var(--light-accent);
        }

        .upload-zone.dragover {
            background: rgba(61, 98, 153, 0.3);
            border-color: var(--light-accent);
        }

        .upload-zone p {
            color: var(--text-secondary);
            margin: 0;
        }

        .preview-container {
            display: none;
            text-align: center;
            margin-bottom: 20px;
        }

        #preview-img {
            max-width: 300px;
            max-height: 200px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
        }

        #file-name {
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(28, 35, 51, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        label {
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        input[type="range"] {
            width: 150px;
            accent-color: var(--light-accent);
        }

        select {
            padding: 5px 10px;
            background: var(--tertiary-dark);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }

        select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--light-accent);
            cursor: pointer;
        }

        button {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--light-accent);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(61, 98, 153, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(94, 138, 191, 0.2);
        }

        button:active {
            transform: scale(0.98);
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: var(--primary-dark);
            font-weight: bold;
        }

        .btn-primary:hover {
            background: var(--light-accent);
        }

        #ascii-output {
            white-space: pre;
            font-size: 8px;
            line-height: 8px;
            background: rgba(10, 15, 28, 0.8);
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            text-align: center;
            min-height: 100px;
            border: 1px solid var(--border-color);
            display: none;
        }

        #ascii-output.visible {
            display: block;
        }

        .hidden {
            display: none !important;
        }

        .status {
            text-align: center;
            color: var(--light-accent);
            margin-top: 10px;
            min-height: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
                letter-spacing: 4px;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }

            .button-group {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="technical-bg"></div>
    <div class="circuit-pattern"></div>
    <div class="grid-overlay"></div>
    <div class="scanning-lines"></div>

    <div class="container">
        <h1>ASCII Art Converter</h1>
        
        <div class="upload-zone" id="upload-zone">
            <p>Drag & drop an image here<br>or click to browse</p>
            <input type="file" id="file-input" accept="image/*" hidden>
        </div>

        <div class="preview-container" id="preview-container">
            <img id="preview-img" alt="Preview">
            <p id="file-name"></p>
        </div>

        <div class="controls" id="controls">
            <div class="control-group">
                <label for="width-slider">Width: <span id="width-value">100</span> chars</label>
                <input type="range" id="width-slider" min="30" max="200" value="100">
            </div>
            <div class="control-group">
                <label for="charset-select">Character Set</label>
                <select id="charset-select">
                    <option value="standard">Standard (@%#*+=-:. )</option>
                    <option value="blocks">Blocks (█▓▒░ )</option>
                    <option value="simple">Simple (MWN$K@#%?*+;:,~ )</option>
                    <option value="binary">Binary (10 )</option>
                </select>
            </div>
            <div class="control-group">
                <label for="invert-check">Invert</label>
                <input type="checkbox" id="invert-check">
            </div>
        </div>

        <div class="button-group">
            <button id="convert-btn" class="btn-primary">Convert</button>
            <button id="copy-btn" class="hidden">Copy</button>
            <button id="download-btn" class="hidden">Download .txt</button>
        </div>

        <pre id="ascii-output"></pre>
        <p class="status" id="status"></p>
    </div>

    <script>
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const previewImg = document.getElementById('preview-img');
        const fileName = document.getElementById('file-name');
        const widthSlider = document.getElementById('width-slider');
        const widthValue = document.getElementById('width-value');
        const charsetSelect = document.getElementById('charset-select');
        const invertCheck = document.getElementById('invert-check');
        const convertBtn = document.getElementById('convert-btn');
        const copyBtn = document.getElementById('copy-btn');
        const downloadBtn = document.getElementById('download-btn');
        const asciiOutput = document.getElementById('ascii-output');
        const status = document.getElementById('status');

        let currentImage = null;
        let asciiText = '';

        const charsets = {
            standard: '@%#*+=-:. ',
            blocks: '█▓▒░ ',
            simple: 'MWN$K@#%?*+;:,~ ',
            binary: '10 '
        };

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                loadImage(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) loadImage(file);
        });

        widthSlider.addEventListener('input', () => {
            widthValue.textContent = widthSlider.value;
        });

        convertBtn.addEventListener('click', convertToAscii);

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(asciiText).then(() => {
                status.textContent = 'Copied to clipboard!';
                setTimeout(() => status.textContent = '', 2000);
            });
        });

        downloadBtn.addEventListener('click', () => {
            const blob = new Blob([asciiText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ascii-art.txt';
            a.click();
            URL.revokeObjectURL(url);
        });

        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    previewImg.src = e.target.result;
                    fileName.textContent = file.name;
                    previewContainer.style.display = 'block';
                    asciiOutput.classList.add('visible');
                    copyBtn.classList.remove('hidden');
                    downloadBtn.classList.remove('hidden');
                    convertToAscii();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function convertToAscii() {
            if (!currentImage) {
                status.textContent = 'Please upload an image first';
                return;
            }

            const width = parseInt(widthSlider.value);
            const charset = charsets[charsetSelect.value];
            const inverted = invertCheck.checked;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            const aspectRatio = currentImage.height / currentImage.width;
            const height = Math.floor(width * aspectRatio * 0.5);

            canvas.width = width;
            canvas.height = height;

            ctx.drawImage(currentImage, 0, 0, width, height);

            const imageData = ctx.getImageData(0, 0, width, height);
            const pixels = imageData.data;

            let ascii = '';

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const i = (y * width + x) * 4;
                    const r = pixels[i];
                    const g = pixels[i + 1];
                    const b = pixels[i + 2];

                    const brightness = (r + g + b) / 3;
                    const charIndex = Math.floor((brightness / 255) * (charset.length - 1));
                    let char = charset[inverted ? charset.length - 1 - charIndex : charIndex];
                    
                    ascii += char;
                }
                ascii += '\n';
            }

            asciiText = ascii;
            asciiOutput.textContent = ascii;
            status.textContent = '';
        }
    </script>
</body>
</html>
